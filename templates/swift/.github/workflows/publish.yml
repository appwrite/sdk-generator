name: Publish to Cocoapods

on:
  release:
    types: [released]

jobs:
  pod:
    name: Lint and publish to Cocoapods
    runs-on: macos-latest
    steps:
      - name: Setup Swift
        uses: fwal/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2.4.0
        with:
          swift-version: "5.4"

      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install cocoapods
        run: gem install cocoapods

      - name: Set library version from tag
        run: echo "POD_LIB_VERSION=${{github.event.release.tag_name }}" >> $GITHUB_ENV

      - name: Deploy to Cocoapods
        run: |
          set -eo pipefail
          pod install
          pod lib lint --allow-warnings
          pod trunk push --allow-warnings
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
