name: Generate Unity ALF

on:
  workflow_dispatch:
  pull_request:

jobs:
  generate:
    name: Generate Unity manual activation file
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-2021.3.45f1-base-3.1.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate manual activation file
        run: |
          /opt/unity/Editor/Unity -nographics -batchmode -createManualActivationFile -logfile || true
          ls -la Unity_v2021.3.45f1.alf

      - name: Upload ALF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: Unity_v2021.3.45f1.alf
          path: Unity_v2021.3.45f1.alf
