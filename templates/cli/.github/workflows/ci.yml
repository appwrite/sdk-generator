name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    env:
      # Keep CI aligned with the release workflow. Bun 1.3.12 stopped embedding
      # Darwin code signatures when cross-compiling from Linux.
      CLI_BUN_VERSION: "1.3.11"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.CLI_BUN_VERSION }}

      - name: Install Node dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify CLI runs with Node
        run: node dist/cli.cjs -v

      - name: Verify npm package can be built
        run: npm pack

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all platform binaries
        run: |
          rm -rf build
          mkdir -p build
          bun run linux-x64
          bun run linux-arm64
          bun run windows-x64
          bun run windows-arm64
          bun run mac-x64
          bun run mac-arm64

      - name: Verify generated binaries
        run: |
          test -s build/appwrite-cli-linux-x64
          test -s build/appwrite-cli-linux-arm64
          test -s build/appwrite-cli-win-x64.exe
          test -s build/appwrite-cli-win-arm64.exe
          test -s build/appwrite-cli-darwin-x64
          test -s build/appwrite-cli-darwin-arm64

      - name: Verify Darwin binaries include valid embedded code signatures
        run: |
          python3 <<'PY'
          import pathlib
          import struct
          import sys

          LC_CODE_SIGNATURE = 0x1D
          MH_MAGIC_64 = 0xFEEDFACF
          CSMAGIC_EMBEDDED_SIGNATURE = 0xFADE0CC0

          def has_valid_code_signature(path: pathlib.Path) -> bool:
              data = path.read_bytes()
              if len(data) < 32:
                  raise ValueError("file is too small to be a Mach-O binary")

              header = struct.unpack_from("<8I", data, 0)
              magic = header[0]
              ncmds = header[4]
              if magic != MH_MAGIC_64:
                  raise ValueError(f"unexpected Mach-O magic {magic:#x}")

              offset = 32
              for _ in range(ncmds):
                  cmd, cmdsize = struct.unpack_from("<II", data, offset)
                  if cmd == LC_CODE_SIGNATURE:
                      data_offset, data_size = struct.unpack_from("<II", data, offset + 8)
                      if data_offset + data_size > len(data):
                          raise ValueError("code signature blob extends past end of file")
                      if data_size < 8:
                          raise ValueError("code signature blob is too small")

                      blob_magic, blob_length = struct.unpack_from(">II", data, data_offset)
                      if blob_magic != CSMAGIC_EMBEDDED_SIGNATURE:
                          raise ValueError(f"unexpected code signature magic {blob_magic:#x}")
                      if blob_length > data_size:
                          raise ValueError(
                              "code signature blob length exceeds Mach-O load command size"
                          )
                      if data_offset + blob_length > len(data):
                          raise ValueError("code signature blob length extends past end of file")

                      return True
                  offset += cmdsize

              return False

          failures = []
          for relative in (
              "build/appwrite-cli-darwin-x64",
              "build/appwrite-cli-darwin-arm64",
          ):
              path = pathlib.Path(relative)
              if not path.exists():
                  failures.append(f"{relative}: file is missing")
                  continue

              try:
                  if not has_valid_code_signature(path):
                      failures.append(f"{relative}: missing LC_CODE_SIGNATURE")
              except Exception as error:
                  failures.append(f"{relative}: {error}")

          if failures:
              for failure in failures:
                  print(failure, file=sys.stderr)
              sys.exit(1)
          PY
