name: Publish Package to npmjs

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      # Bun 1.3.12 started producing unsigned Darwin binaries when cross-compiling
      # from Linux, which macOS kills on launch. Keep releases on the last known-good
      # toolchain until upstream fixes the regression.
      CLI_BUN_VERSION: '1.3.11'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.CLI_BUN_VERSION }}

      - name: Setup binfmt with QEMU
        run: | 
          sudo apt update
          sudo apt install qemu-system binfmt-support qemu-user-static
          update-binfmts --display

      - name: Setup ldid
        run: |
          git clone https://github.com/tpoechtrager/ldid
          cd ./ldid
          sudo make
          sudo make install

      - name: Install dependencies and build for Linux and Windows
        run: |
          bun install --frozen-lockfile
          bun run linux-x64
          bun run linux-arm64
          bun run mac-x64
          bun run mac-arm64
          bun run windows-x64
          bun run windows-arm64

      - name: Verify Darwin binaries include valid embedded code signatures
        run: |
          python3 <<'PY'
          import pathlib
          import struct
          import sys

          LC_CODE_SIGNATURE = 0x1D
          MH_MAGIC_64 = 0xFEEDFACF
          CSMAGIC_EMBEDDED_SIGNATURE = 0xFADE0CC0

          def has_valid_code_signature(path: pathlib.Path) -> bool:
              data = path.read_bytes()
              if len(data) < 32:
                  raise ValueError("file is too small to be a Mach-O binary")

              header = struct.unpack_from("<8I", data, 0)
              magic = header[0]
              ncmds = header[4]
              if magic != MH_MAGIC_64:
                  raise ValueError(f"unexpected Mach-O magic {magic:#x}")

              offset = 32
              for _ in range(ncmds):
                  cmd, cmdsize = struct.unpack_from("<II", data, offset)
                  if cmd == LC_CODE_SIGNATURE:
                      data_offset, data_size = struct.unpack_from("<II", data, offset + 8)
                      if data_offset + data_size > len(data):
                          raise ValueError("code signature blob extends past end of file")
                      if data_size < 8:
                          raise ValueError("code signature blob is too small")

                      blob_magic, blob_length = struct.unpack_from(">II", data, data_offset)
                      if blob_magic != CSMAGIC_EMBEDDED_SIGNATURE:
                          raise ValueError(f"unexpected code signature magic {blob_magic:#x}")
                      if blob_length > data_size:
                          raise ValueError(
                              "code signature blob length exceeds Mach-O load command size"
                          )
                      if data_offset + blob_length > len(data):
                          raise ValueError("code signature blob length extends past end of file")

                      return True
                  offset += cmdsize

              return False

          failures = []
          for relative in (
              "build/appwrite-cli-darwin-x64",
              "build/appwrite-cli-darwin-arm64",
          ):
              path = pathlib.Path(relative)
              if not path.exists():
                  failures.append(f"{relative}: file is missing")
                  continue

              try:
                  if not has_valid_code_signature(path):
                      failures.append(f"{relative}: missing LC_CODE_SIGNATURE")
              except Exception as error:
                  failures.append(f"{relative}: {error}")

          if failures:
              for failure in failures:
                  print(failure, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'
          registry-url: 'https://registry.npmjs.org'

      - name: Pin npm for trusted publishing
        run: npm install -g npm@11.10.0

      - name: Determine release tag
        id: release_tag
        run: |
          if [[ "${{ github.ref }}" == *"-rc"* ]] || [[ "${{ github.ref }}" == *"-RC"* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        run: npm publish --provenance --access public --tag ${{ steps.release_tag.outputs.tag }}

      - uses: fnkr/github-action-ghr@v1
        env:
          GHR_PATH: build/
          GHR_REPLACE: false
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Update Homebrew formula checksums
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          TARGET_COMMITISH: ${{ github.event.release.target_commitish }}
        run: |
          set -euo pipefail

          TARGET_BRANCH="$TARGET_COMMITISH"
          if ! git ls-remote --exit-code --heads origin "$TARGET_BRANCH" >/dev/null 2>&1; then
            TARGET_BRANCH="master"
          fi

          git fetch origin "$TARGET_BRANCH"
          git switch -C "$TARGET_BRANCH" "origin/$TARGET_BRANCH"

          FORMULA_PATH="$(find Formula -maxdepth 1 -name '*.rb' | head -n 1)"
          if [ -z "$FORMULA_PATH" ]; then
            echo "Formula file not found"
            exit 1
          fi

          EXECUTABLE_NAME="$(basename "$FORMULA_PATH" .rb)"
          export FORMULA_PATH RELEASE_TAG EXECUTABLE_NAME
          export MAC_ARM64_SHA256="$(sha256sum "build/${EXECUTABLE_NAME}-cli-darwin-arm64" | awk '{print $1}')"
          export MAC_X64_SHA256="$(sha256sum "build/${EXECUTABLE_NAME}-cli-darwin-x64" | awk '{print $1}')"
          export LINUX_ARM64_SHA256="$(sha256sum "build/${EXECUTABLE_NAME}-cli-linux-arm64" | awk '{print $1}')"
          export LINUX_X64_SHA256="$(sha256sum "build/${EXECUTABLE_NAME}-cli-linux-x64" | awk '{print $1}')"

          ruby <<'RUBY'
          formula_path = ENV.fetch("FORMULA_PATH")
          executable = ENV.fetch("EXECUTABLE_NAME")
          release_tag = ENV.fetch("RELEASE_TAG")
          checksums = {
            "#{executable}-cli-darwin-arm64" => ENV.fetch("MAC_ARM64_SHA256"),
            "#{executable}-cli-darwin-x64" => ENV.fetch("MAC_X64_SHA256"),
            "#{executable}-cli-linux-arm64" => ENV.fetch("LINUX_ARM64_SHA256"),
            "#{executable}-cli-linux-x64" => ENV.fetch("LINUX_X64_SHA256"),
          }

          text = File.read(formula_path)

          unless text.sub!(/^(\s*version ")([^"]+)(")$/) { "#{$1}#{release_tag}#{$3}" }
            abort("Failed to update formula version")
          end

          checksums.each do |artifact, checksum|
            pattern = /(#{Regexp.escape(artifact)}"\n\s+sha256 ")([0-9a-f]{64})(")/
            unless text.sub!(pattern) { "#{$1}#{checksum}#{$3}" }
              abort("Failed to update checksum for #{artifact}")
            end
          end

          File.write(formula_path, text)
          RUBY

          ruby -c "$FORMULA_PATH"

          if git diff --quiet -- "$FORMULA_PATH"; then
            echo "Homebrew formula already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA_PATH"
          git commit -m "chore: update Homebrew formula for ${RELEASE_TAG}"
          git push origin "$TARGET_BRANCH"
